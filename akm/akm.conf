#!/bin/bash

### Config file for akm.

# When installing/uninstalling a kernel, you may configure to
# install/uninstall the related header too.
# Values: "yes" or "no"
# Default: no
local KERNEL_HEADER_WITH_KERNEL=no

# List of kernel and header names when using additional repos.
# Example:
#   local AKM_KERNELS_HEADERS=(
#       reponame/linux-xxx  reponame/linux-xxx-headers
#       reponame/linux-yyy  reponame/linux-yyy-headers
#       ...
#   )
# where
#    reponame   The name of an additional repository.
#    linux-xxx  The name of a kernel.
#
local AKM_KERNELS_HEADERS=(
)

# Width of the akm window in pixels.
# Default: 900
local AKM_WINDOW_WIDTH=900

# Set AKM_PREFER_SMALL_WINDOW to "yes" if you are using a small display with low resolution,
# e.g. 1366x768.
# Default: no
local AKM_PREFER_SMALL_WINDOW=no

# Uncomment and set LANGUAGE to override GUI language. Normaly not needed, by default the current
# system language defined by the LANG or LC_ALL environment variable will be used. If translation
# for system language is not available, or if LANGUAGE is set to a language without translation,
# english will be used instead. Uses the same language code format as LANG / LC_ALL.
#LANGUAGE=en

